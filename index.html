<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		h1,h2,h3,p{margin:0; padding: 0}
	    body{  margin: 0; padding: 0;  overflow-x: hidden; background: #000;}
	    .img-wrap { position: relative; width: 100vw; height: 100vh; background-image: url('img1.png');
			background-size: cover; background-position: center;}

		.book-wrap {
			position: absolute;
			width: 80vw;
			top: 3vh;
			left: 11vw;
		}
        .book-wrap .book {
			width: 100%;  
			display: block;
			position: relative;
		}

	    .book-wrap img {
			position: absolute;
			display: block;
		}

		.book1 { width: 18%;  top: 21.5%;  left: 21.3%; animation: float 2s ease-in-out infinite; }
		.text1 { width: 25%;  top: 60%;  left: 19.8%; }
		.text2 { width: 25%;  top: 67%;  left: 19.8%; }
		.text3 { width: 25%;  top: 20.5%;  left: 58%; }
		.text4 { width: 25%;  top: 29%;  left: 58%; }
		.text5 { width: 21%;  top: 31%;  left: 60%; }

		@keyframes float {
        0%   { transform: translateY(0); }      
        50%  { transform: translateY(-15px); }  
        100% { transform: translateY(0); }      
    	}
	</style>
</head>
<body>
	<section>
	<div class="img-wrap">
		<div class="book-wrap">              
			<img src="img2.png" class="book">
			<img src="img3.png" class="book1">
			<img src="img4.png" class="text1">
			<img src="img5.png" class="text2">
			<img src="img6.png" class="text3">
			<img src="img7.png" class="text4">
			<img src="img8.png" class="text5">
		</div>  
	</div>
 </section>
</body>
</html>
